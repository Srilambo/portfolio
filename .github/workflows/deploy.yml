name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install & Build Client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install & Build Server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Build Docker images
        run: docker compose build

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no \
            docker-compose.yml server/.env.example \
            ${SERVER_USER}@${SERVER_HOST}:/opt/portfolio/
          ssh -i key.pem ${SERVER_USER}@${SERVER_HOST} \
            "cd /opt/portfolio && docker compose pull && docker compose up -d --build"
          rm key.pem
